<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Elo Leaderboard</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>RANKINGS</h1>

<!-- Toggle -->
<div class="toggle-container">
    <label class="switch small-switch">
        <input type="checkbox" id="toggleInactive">
        <span class="slider small-slider"></span>
    </label>
    <span class="toggle-label">Show Inactive Players</span>
</div>

<!-- Leaderboard -->
<table id="leaderboard">
    <thead>
    <tr>
        <th>Rank</th>
        <th>Player</th>
        <th>Elo</th>
        <th>W/L</th>
        <th>TOTAL K/D</th>
    </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>

<!-- Player Details Modal -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <span id="closeModal" class="close">&times;</span>

        <!-- ⭐ NEW WRAPPER FOR SHRINKING CONTENT ⭐ -->
        <div class="card-contents-wrapper">
            <div id="cdlCard"></div>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
